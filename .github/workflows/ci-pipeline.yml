name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.9'
  IMAGE_NAME: sakila-app

jobs:

  lint:
    name: Code Quality Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: |
          flake8 . --max-line-length=120 \
            --extend-ignore=E501,W503,W293,W291,W292,E302,E128,E265,E402,E303 \
            --exclude=.git,__pycache__,migrations,sakila-data.sql,sakila-schema.sql

  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: admin
          MYSQL_DATABASE: sakila
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -padmin"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Wait for MySQL to be healthy
        run: |
          until mysqladmin ping -h 127.0.0.1 -uroot -padmin --silent; do
            echo "Waiting for MySQL..."
            sleep 5
          done

      - name: Import Sakila schema
        run: |
          curl -L -o sakila-schema.sql https://raw.githubusercontent.com/jOOQ/sakila/main/mysql-sakila-db/mysql-sakila-schema.sql
          mysql -h 127.0.0.1 -uroot -padmin sakila < sakila-schema.sql

      - name: Import Sakila data
        run: |
          curl -L -o sakila-data.sql https://raw.githubusercontent.com/jOOQ/sakila/main/mysql-sakila-db/mysql-sakila-insert-data.sql
          mysql -h 127.0.0.1 -uroot -padmin sakila < sakila-data.sql

      - name: Run pytest
        env:
          MYSQL_HOST: 127.0.0.1
          MYSQL_USER: root
          MYSQL_PASSWORD: admin
          MYSQL_DB: sakila
        run: pytest tests/ -v

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .

      - name: Verify image was created
        run: docker images

      - name: Smoke test
        run: |
          docker run -d --name test-app \
            -p 5000:5000 \
            -e MYSQL_HOST=localhost \
            -e MYSQL_USER=root \
            -e MYSQL_PASSWORD=admin \
            -e MYSQL_DB=sakila \
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          sleep 10
          curl --fail http://localhost:5000 || exit 1

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build image for scanning
        run: docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'
          output: 'trivy-results.txt'

      - name: Upload Trivy scan results
        uses: actions/upload-artifact@v4
        with:
          name: trivy-security-report
          path: trivy-results.txt